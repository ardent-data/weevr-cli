name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format (check)
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy .

      - name: Tests
        run: uv run pytest
