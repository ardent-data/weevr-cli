name: Deploy Docs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group docs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages --depth=1 || true
        # Fetch existing gh-pages for mike version history.
        # '|| true' handles first deploy when branch doesn't exist yet.

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip 'v' prefix and patch version: v1.2.3 → 1.2
          VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/\.[0-9]*$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy docs
        run: uv run mike deploy ${{ steps.version.outputs.version }} latest --update-aliases --push
